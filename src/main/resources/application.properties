spring.application.name=delivery-risk-intelligence-platform

# In-memory H2 database - swap for Postgres/MySQL in production
spring.datasource.url=jdbc:h2:mem:deliveryrisk;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Allow the Vite dev server to call this API during local development
app.cors.allowed-origins=http://localhost:5173
